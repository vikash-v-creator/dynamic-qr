<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate QR codes instantly from any URL. Free, fast, no sign-up required.">
  <title>QR Generator — Instant QR Codes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <!-- Subtle background decoration -->
    <div class="bg-glow"></div>

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><circle cx="17.5" cy="17.5" r="3.5"/>
        </svg>
        <span>QR <span class="accent">Generator</span></span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <div class="hero-text">
        <h1>Generate <span class="accent">QR Codes</span> Instantly</h1>
        <p>Paste any URL, get a scannable QR code in seconds. No sign-up, no tracking, completely free.</p>
      </div>

      <!-- Generator Card -->
      <div class="generator-card" id="generatorCard">
        <div class="input-row">
          <div class="input-wrapper" id="inputWrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
            <input
              type="url"
              id="urlInput"
              placeholder="https://example.com"
              autocomplete="off"
              spellcheck="false"
            >
            <button class="clear-btn hidden" id="clearBtn" aria-label="Clear input">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <button class="generate-btn" id="generateBtn">
            <span>Generate</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
        <p class="error-msg hidden" id="errorMsg">Please enter a valid URL (e.g. https://example.com)</p>
      </div>

      <!-- QR Output -->
      <div class="qr-output hidden" id="qrOutput">
        <div class="qr-card">
          <div class="qr-canvas-wrap" id="qrCanvasWrap">
            <!-- QR code renders here -->
          </div>
          <div class="qr-url" id="qrUrl"></div>
          <div class="download-row">
            <button class="dl-btn" id="dlPng">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              <span>PNG</span>
            </button>
            <button class="dl-btn" id="dlSvg">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              <span>SVG</span>
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Built with speed in mind. No data stored. Ever.</p>
    </footer>
  </div>

  <!-- QR Code library (lightweight, client-side) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
